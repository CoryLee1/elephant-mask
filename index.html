<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蓝象头套 - Face AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 24px;
    }
    h1 { margin: 14px 0 8px; font-size: 1.3rem; letter-spacing: 1px; }
    #controls {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    label { font-size: 0.85rem; color: #aaa; }
    input[type=range] { width: 120px; vertical-align: middle; }
    span.val { width: 42px; display: inline-block; text-align: right; font-size: 0.85rem; }
    .btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 14px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn.active { background: #0a84ff; border-color: #0a84ff; }
    #stage {
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }
    /* video 隐藏，只用于 MediaPipe 输入 */
    #webcam { display: none; }
    #status {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #aaa;
      height: 20px;
    }
    #obs-tip {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #666;
      max-width: 700px;
      text-align: center;
      line-height: 1.8;
    }
    #obs-tip b { color: #aaa; }
    #streamBtn {
      margin-top: 10px;
      background: #1a8a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 28px;
      font-size: 1rem;
      cursor: pointer;
    }
    #streamBtn.connected { background: #c00; }
    #streamStatus { margin-top: 6px; font-size: 0.78rem; color: #888; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <h1>🐘 蓝象头套 AR</h1>

  <div id="controls">
    <button class="btn active" id="btn169">16:9 横版</button>
    <button class="btn"        id="btn916">9:16 竖版</button>

    <label>缩放
      <input type="range" id="scaleSlider" min="0.5" max="100.0" step="0.5" value="45.0" />
      <span class="val" id="scaleVal">45.0</span>
    </label>
    <label>Y 偏移
      <input type="range" id="ySlider" min="-10.0" max="10.0" step="0.05" value="0.0" />
      <span class="val" id="yVal">0.00</span>
    </label>
    <label>前后偏移
      <input type="range" id="zSlider" min="-10.0" max="10.0" step="0.05" value="0.0" />
      <span class="val" id="zVal">0.00</span>
    </label>
  </div>

  <!-- video 隐藏，只做 MediaPipe 输入源 -->
  <video id="webcam" autoplay playsinline muted></video>

  <div id="stage">
    <!-- 合成canvas：先画镜像视频帧，再叠Three.js -->
    <canvas id="composite"></canvas>
  </div>

  <div id="status">正在初始化…</div>
  <button id="streamBtn">开始推流到 OBS</button>
  <div id="streamStatus">点击按钮，然后在 OBS 添加浏览器源 http://localhost:8765/viewer.html</div>
  <div id="obs-tip">
    <b>OBS 步骤：</b>来源 → 浏览器源 → URL 填 <b>http://localhost:8765/viewer.html</b> → 宽高匹配上方选择
  </div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import {
      FaceLandmarker,
      FilesetResolver,
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

    const video     = document.getElementById("webcam");
    const composite = document.getElementById("composite");
    const statusEl  = document.getElementById("status");
    const stage     = document.getElementById("stage");

    const scaleSlider = document.getElementById("scaleSlider");
    const ySlider     = document.getElementById("ySlider");
    const zSlider     = document.getElementById("zSlider");
    const scaleValEl  = document.getElementById("scaleVal");
    const yValEl      = document.getElementById("yVal");
    const zValEl      = document.getElementById("zVal");

    scaleSlider.oninput = () => scaleValEl.textContent = (+scaleSlider.value).toFixed(1);
    ySlider.oninput     = () => yValEl.textContent     = (+ySlider.value).toFixed(2);
    zSlider.oninput     = () => zValEl.textContent     = (+zSlider.value).toFixed(2);

    // ── 尺寸 ─────────────────────────────────────────────────────────────────
    const DISPLAY = {
      "169": { w: 854, h: 480 },
      "916": { w: 270, h: 480 },
    };

    let W = DISPLAY["169"].w;
    let H = DISPLAY["169"].h;
    let renderer, camera;

    function applySize(mode) {
      const d = DISPLAY[mode];
      W = d.w; H = d.h;
      composite.width  = W;
      composite.height = H;
      stage.style.width  = W + "px";
      stage.style.height = H + "px";
      if (renderer) {
        renderer.setSize(W, H);
        camera.aspect = W / H;
        camera.updateProjectionMatrix();
      }
      document.getElementById("btn169").classList.toggle("active", mode === "169");
      document.getElementById("btn916").classList.toggle("active", mode === "916");
    }

    document.getElementById("btn169").onclick = () => applySize("169");
    document.getElementById("btn916").onclick = () => applySize("916");

    // ── Three.js（离屏渲染，不绑定到页面canvas）─────────────────────────────
    composite.width  = W;
    composite.height = H;
    stage.style.width  = W + "px";
    stage.style.height = H + "px";

    // Three.js 渲染到独立的离屏canvas
    const threeCanvas = document.createElement("canvas");
    threeCanvas.width  = W;
    threeCanvas.height = H;

    renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(1);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, W / H, 0.01, 100);
    camera.position.set(0, 0, 2);

    scene.add(new THREE.AmbientLight(0xffffff, 2.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(0, 1, 2);
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 1.0);
    fillLight.position.set(0, -1, 1);
    scene.add(fillLight);

    // composite canvas 的 2D context，用于合成
    const ctx = composite.getContext("2d");

    // ── Load GLB ──────────────────────────────────────────────────────────────
    let headModel = null;
    statusEl.textContent = "正在加载 GLB 模型…";

    new GLTFLoader().load(
      "./Meshy_AI_Blue_Elephant.glb",
      (gltf) => {
        headModel = gltf.scene;
        const box    = new THREE.Box3().setFromObject(headModel);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        headModel.position.sub(center);
        headModel.scale.setScalar(1 / Math.max(size.x, size.y, size.z));
        headModel.visible = false;
        scene.add(headModel);
        statusEl.textContent = "模型已加载，正在启动摄像头…";
        startCamera();
      },
      undefined,
      (err) => { statusEl.textContent = "GLB 加载失败: " + err.message; }
    );

    // ── Camera ────────────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }, audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadeddata = r; });
        statusEl.textContent = "正在加载 MediaPipe…";
        startMediaPipe();
      } catch (e) {
        statusEl.textContent = "摄像头访问失败: " + e.message;
      }
    }

    // ── MediaPipe ─────────────────────────────────────────────────────────────
    async function startMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
      );
      const landmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU",
        },
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: true,
        runningMode: "VIDEO",
        numFaces: 1,
      });

      statusEl.textContent = "运行中 ✅";

      const mpMat  = new THREE.Matrix4();
      const tmpQ   = new THREE.Quaternion();
      const tmpPos = new THREE.Vector3();
      const tmpSc  = new THREE.Vector3();

      function applyFaceMatrix(matData) {
        mpMat.fromArray(matData);
        mpMat.decompose(tmpPos, tmpQ, tmpSc);
        headModel.position.set(
          -tmpPos.x,
          tmpPos.y + (+ySlider.value),
          tmpPos.z + (+zSlider.value)
        );
        headModel.quaternion.set(tmpQ.x, -tmpQ.y, -tmpQ.z, tmpQ.w);
        headModel.quaternion.normalize();
        headModel.scale.setScalar(+scaleSlider.value);
      }

      let lastTime = -1;
      function tick(now) {
        requestAnimationFrame(tick);
        if (video.readyState < 2) return;

        // 1. 先把镜像视频帧画到合成canvas
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -W, 0, W, H);
        ctx.restore();

        // 2. MediaPipe 检测（用原始未镜像的video）
        if (now !== lastTime) {
          lastTime = now;
          const result = landmarker.detectForVideo(video, now);
          if (result.facialTransformationMatrixes?.length > 0) {
            headModel.visible = true;
            applyFaceMatrix(result.facialTransformationMatrixes[0].data);
          } else {
            headModel.visible = false;
          }
        }

        // 3. Three.js 渲染到离屏canvas
        renderer.render(scene, camera);

        // 4. 把Three.js结果叠加到合成canvas
        ctx.drawImage(threeCanvas, 0, 0, W, H);
      }
      requestAnimationFrame(tick);
    }
    // ── WebRTC 推流 ───────────────────────────────────────────────────────────
    const streamBtn    = document.getElementById("streamBtn");
    const streamStatus = document.getElementById("streamStatus");
    let pc = null;
    let ws = null;

    streamBtn.onclick = () => {
      if (pc) {
        pc.close(); pc = null;
        ws && ws.close(); ws = null;
        streamBtn.textContent = "开始推流到 OBS";
        streamBtn.classList.remove("connected");
        streamStatus.textContent = "已停止推流";
        return;
      }
      startStream();
    };

    function startStream() {
      const stream = composite.captureStream(30); // 30fps

      pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: "join", room: "elephant" }));
        streamStatus.textContent = "等待 OBS viewer 连接…";
      };

      ws.onmessage = async ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === "peer-joined") {
          // viewer 加入，发 offer
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          ws.send(JSON.stringify({ type: "offer", sdp: pc.localDescription }));
        } else if (msg.type === "answer") {
          await pc.setRemoteDescription(msg.sdp);
          streamBtn.textContent = "停止推流";
          streamBtn.classList.add("connected");
          streamStatus.textContent = "推流中 ✅ OBS 已接收画面";
        } else if (msg.type === "candidate" && msg.candidate) {
          await pc.addIceCandidate(msg.candidate);
        }
      };

      pc.onicecandidate = ({ candidate }) => {
        if (candidate && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: "candidate", candidate }));
        }
      };

      streamBtn.textContent = "停止推流";
      streamBtn.classList.add("connected");
    }
  </script>
</body>
</html>
