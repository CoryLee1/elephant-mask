<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蓝象头套 - Face AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      padding: 8px 10px 12px;
    }
    h1 { margin: 0 0 6px; font-size: 1.1rem; letter-spacing: 1px; }
    #controls {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    label { font-size: 0.78rem; color: #aaa; }
    input[type=range] { width: 110px; vertical-align: middle; }
    span.val { width: 42px; display: inline-block; text-align: right; font-size: 0.78rem; }
    .btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .btn.active { background: #0a84ff; border-color: #0a84ff; }
    #stage {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      /* 尺寸由 JS 控制 */
    }
    #webcam {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #status {
      margin-top: 6px;
      font-size: 0.72rem;
      color: #aaa;
      min-height: 16px;
    }
    #obs-tip {
      margin-top: 6px;
      font-size: 0.68rem;
      color: #666;
      max-width: min(920px, 96vw);
      text-align: center;
      line-height: 1.35;
    }
    #obs-tip b { color: #aaa; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <h1>🐘 蓝象头套 AR</h1>

  <div id="controls">
    <button class="btn active" id="btn169">16:9 横版</button>
    <button class="btn"        id="btn916">9:16 竖版</button>

    <label>缩放
      <input type="range" id="scaleSlider" min="0.5" max="100.0" step="0.5" value="45.0" />
      <span class="val" id="scaleVal">45.0</span>
    </label>
    <label>Y 偏移
      <input type="range" id="ySlider" min="-10.0" max="10.0" step="0.05" value="0.0" />
      <span class="val" id="yVal">0.00</span>
    </label>
    <label>前后偏移
      <input type="range" id="zSlider" min="-10.0" max="10.0" step="0.05" value="0.0" />
      <span class="val" id="zVal">0.00</span>
    </label>
  </div>

  <div id="stage">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status">正在初始化…</div>
  <div id="obs-tip">
    <b>OBS 推流：</b>来源 → 浏览器源 → URL 填 <b>http://localhost:8765</b>（或你的 Pages 地址），宽高与上方选择一致，勾选"关闭时刷新"
  </div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import {
      FaceLandmarker,
      FilesetResolver,
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

    // ── 尺寸切换 ─────────────────────────────────────────────────────────────
    const SIZES = {
      "169": { w: 1280, h: 720  },
      "916": { w: 720,  h: 1280 },
    };
    let currentMode = "169";
    const stage   = document.getElementById("stage");
    const canvas  = document.getElementById("overlay");
    const video   = document.getElementById("webcam");
    const titleEl = document.querySelector("h1");
    const controlsEl = document.getElementById("controls");
    const statusEl    = document.getElementById("status");
    const obsTipEl = document.getElementById("obs-tip");

    let renderer, camera;

    function getDisplaySize(mode) {
      const source = SIZES[mode];
      const aspect = source.w / source.h;
      const reservedHeight =
        titleEl.offsetHeight +
        controlsEl.offsetHeight +
        statusEl.offsetHeight +
        obsTipEl.offsetHeight +
        42;
      const maxW = Math.max(240, window.innerWidth - 20);
      const maxH = Math.max(240, window.innerHeight - reservedHeight);
      let w = maxW;
      let h = w / aspect;

      if (h > maxH) {
        h = maxH;
        w = h * aspect;
      }

      return { w: Math.round(w), h: Math.round(h) };
    }

    function applySize(mode) {
      currentMode = mode;
      const d = getDisplaySize(mode);
      stage.style.width  = d.w + "px";
      stage.style.height = d.h + "px";
      canvas.width  = d.w;
      canvas.height = d.h;
      if (renderer) {
        renderer.setSize(d.w, d.h);
        camera.aspect = d.w / d.h;
        camera.updateProjectionMatrix();
      }
      document.getElementById("btn169").classList.toggle("active", mode === "169");
      document.getElementById("btn916").classList.toggle("active", mode === "916");
    }

    document.getElementById("btn169").onclick = () => applySize("169");
    document.getElementById("btn916").onclick = () => applySize("916");
    window.addEventListener("resize", () => applySize(currentMode));

    // ── Sliders ───────────────────────────────────────────────────────────────
    const scaleSlider = document.getElementById("scaleSlider");
    const ySlider     = document.getElementById("ySlider");
    const zSlider     = document.getElementById("zSlider");
    const scaleValEl  = document.getElementById("scaleVal");
    const yValEl      = document.getElementById("yVal");
    const zValEl      = document.getElementById("zVal");
    scaleSlider.oninput = () => scaleValEl.textContent = (+scaleSlider.value).toFixed(1);
    ySlider.oninput     = () => yValEl.textContent     = (+ySlider.value).toFixed(2);
    zSlider.oninput     = () => zValEl.textContent     = (+zSlider.value).toFixed(2);

    // ── Three.js ──────────────────────────────────────────────────────────────
    const d0 = getDisplaySize("169");
    canvas.width  = d0.w;
    canvas.height = d0.h;
    stage.style.width  = d0.w + "px";
    stage.style.height = d0.h + "px";

    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(d0.w, d0.h);
    renderer.setPixelRatio(1);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, d0.w / d0.h, 0.01, 100);
    camera.position.set(0, 0, 2);

    scene.add(new THREE.AmbientLight(0xffffff, 2.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(0, 1, 2);
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 1.0);
    fillLight.position.set(0, -1, 1);
    scene.add(fillLight);

    // ── Load GLB ──────────────────────────────────────────────────────────────
    let headModel = null;
    statusEl.textContent = "正在加载 GLB 模型…";

    new GLTFLoader().load(
      "./Meshy_AI_Blue_Elephant.glb",
      (gltf) => {
        headModel = gltf.scene;
        const box    = new THREE.Box3().setFromObject(headModel);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        headModel.position.sub(center);
        headModel.scale.setScalar(1 / Math.max(size.x, size.y, size.z));
        headModel.visible = false;
        scene.add(headModel);
        statusEl.textContent = "模型已加载，正在启动摄像头…";
        startCamera();
      },
      undefined,
      (err) => { statusEl.textContent = "GLB 加载失败: " + err.message; }
    );

    // ── Camera ────────────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }, audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadeddata = r; });
        statusEl.textContent = "正在加载 MediaPipe…";
        startMediaPipe();
      } catch (e) {
        statusEl.textContent = "摄像头访问失败: " + e.message;
      }
    }

    // ── 信令服务地址 ────────────────────────────────────────────────────────────
    // 允许通过 URL 参数 signal 覆盖，例如：
    // ?signal=wss://your-signaling-server.example.com
    const signalParam = new URLSearchParams(location.search).get("signal");
    const defaultSignal = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}`;
    const SIGNAL_URL = signalParam || defaultSignal;
    statusEl.textContent = `信令地址: ${SIGNAL_URL}`;

    // ── MediaPipe ─────────────────────────────────────────────────────────────
    async function startMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
      );
      const landmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU",
        },
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: true,
        runningMode: "VIDEO",
        numFaces: 1,
      });

      statusEl.textContent = "运行中 ✅";

      const mpMat  = new THREE.Matrix4();
      const tmpQ   = new THREE.Quaternion();
      const tmpPos = new THREE.Vector3();
      const tmpSc  = new THREE.Vector3();

      function applyFaceMatrix(matData) {
        mpMat.fromArray(matData);
        mpMat.decompose(tmpPos, tmpQ, tmpSc);

        headModel.position.set(
          -tmpPos.x,
          tmpPos.y + (+ySlider.value),
          tmpPos.z + (+zSlider.value)
        );
        headModel.quaternion.set(tmpQ.x, -tmpQ.y, -tmpQ.z, tmpQ.w);
        headModel.quaternion.normalize();
        headModel.scale.setScalar(+scaleSlider.value);
      }

      let lastTime = -1;
      function tick(now) {
        requestAnimationFrame(tick);
        if (video.readyState >= 2 && now !== lastTime) {
          lastTime = now;
          const result = landmarker.detectForVideo(video, now);
          if (result.facialTransformationMatrixes?.length > 0) {
            headModel.visible = true;
            applyFaceMatrix(result.facialTransformationMatrixes[0].data);
          } else {
            headModel.visible = false;
          }
        }
        renderer.render(scene, camera);
      }
      requestAnimationFrame(tick);

      // 建立 WebRTC 推流连接（推送本页合成画面到 viewer.html）
      startBroadcast();

      async function startBroadcast() {
        const ws = new WebSocket(SIGNAL_URL);
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

        const stream = canvas.captureStream(30);
        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        ws.onopen = () => {
          ws.send(JSON.stringify({ type: "join", room: "elephant" }));
        };

        ws.onmessage = async ({ data }) => {
          const msg = JSON.parse(data);
          if (msg.type === "peer-joined") {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: "offer", sdp: pc.localDescription }));
          } else if (msg.type === "answer") {
            await pc.setRemoteDescription(msg.sdp);
          } else if (msg.type === "candidate" && msg.candidate) {
            await pc.addIceCandidate(msg.candidate);
          }
        };

        ws.onerror = () => {
          statusEl.textContent = "信令连接失败，请检查 signal 参数或后端地址";
        };

        pc.onicecandidate = ({ candidate }) => {
          if (candidate && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: "candidate", candidate }));
          }
        };
      }
    }
  </script>
</body>
</html>
